name: Build Windows Client  
  
on:  
  push:  
    branches: [ main, master ]  
  pull_request:  
    branches: [ main, master ]  
  workflow_dispatch:  
  
jobs:  
  build-windows:  
    runs-on: windows-latest  
      
    steps:  
    - name: Checkout代码  
      uses: actions/checkout@v4  
      with:  
        submodules: recursive  
      
    - name: 安装Qt6  
      uses: jurplel/install-qt-action@v3  
      with:  
        version: '6.6.*'  
        host: 'windows'  
        target: 'desktop'  
        arch: 'win64_msvc2019_64'  
        modules: 'qtwebsockets'  
        cache: true  
      
    - name: 安装CMake  
      uses: jwlawson/actions-setup-cmake@v2  
      with:  
        cmake-version: '3.28.x'  
      
    - name: 设置MSVC环境  
      uses: ilammy/msvc-dev-cmd@v1  
      with:  
        arch: x64  
      
    - name: 安装OpenSSL  
      run: |  
        choco install openssl -y  
          
    - name: 配置CMake  
      working-directory: AdaptixClient  
      run: |  
        cmake -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release .  
      
    - name: 编译客户端  
      working-directory: AdaptixClient  
      run: |  
        nmake  
      
    - name: 收集依赖DLL  
      working-directory: AdaptixClient  
      run: |  
        windeployqt AdaptixClient.exe --release  
      
    - name: 上传构建产物  
      uses: actions/upload-artifact@v4  
      with:  
        name: AdaptixClient-Windows-x64  
        path: |  
          AdaptixClient/AdaptixClient.exe  
          AdaptixClient/*.dll  
        retention-days: 30  
      
    - name: 创建发布包  
      if: startsWith(github.ref, 'refs/tags/')  
      run: |  
        mkdir release  
        cp AdaptixClient/AdaptixClient.exe release/  
        cp AdaptixClient/*.dll release/  
        Compress-Archive -Path release/* -DestinationPath AdaptixClient-Windows-x64.zip  
      
    - name: 创建Release  
      if: startsWith(github.ref, 'refs/tags/')  
      uses: softprops/action-gh-release@v1  
      with:  
        files: AdaptixClient-Windows-x64.zip  
      env:  
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
