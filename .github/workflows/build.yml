name: Build AdaptixC2 - Linux Server & Windows Client

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # 构建 Linux 服务端
  build-server:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go 1.24.4
        run: |
          wget https://go.dev/dl/go1.24.4.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.24.4.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y mingw-w64 make gcc g++
      
      - name: Build Server
        run: |
          make server
          make extenders
      
      - name: Upload Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: |
            dist/adaptixserver
            dist/extenders/
          retention-days: 30

  # 构建 Windows 客户端
  build-client-windows:
    runs-on: ubuntu-24.04
    needs: build-server
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross-compilation tools
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            ninja-build \
            build-essential \
            g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev \
            libssl-dev \
            qt6-base-dev \
            qt6-websockets-dev \
            qt6-declarative-dev
      
      - name: Install Qt6 for MinGW
        run: |
          wget https://download.qt.io/official_releases/qt/6.5/6.5.3/qt-opensource-linux-x64-6.5.3.run
          chmod +x qt-opensource-linux-x64-6.5.3.run
          ./qt-opensource-linux-x64-6.5.3.run --silent --accept-licenses
      
      - name: Build Windows Client
        env:
          CMAKE_TOOLCHAIN_FILE: cmake/mingw-toolchain.cmake
          QT_ROOT: /opt/Qt/6.5.3/mingw_64
        run: |
          cd client
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=Windows
          cmake --build . --config Release -j$(nproc)
      
      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: client/build/AdaptixClient.exe
          retention-days: 30
