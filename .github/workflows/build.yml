name: Build AdaptixC2 - Fixed

on:
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Remove pre-installed Go
        run: sudo rm -rf /usr/local/go /usr/bin/go
      
      - name: Install Go 1.24.4
        run: |
          wget -q https://go.dev/dl/go1.24.4.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.24.4.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64
      
      - name: Build Server
        run: |
          export PATH=$PATH:/usr/local/go/bin
          make server
          make extenders
      
      - name: Upload Server
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: dist/
          retention-days: 7

  build-client-windows:
    runs-on: ubuntu-24.04
    needs: build-server
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross-compile tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            g++-mingw-w64-x86-64 \
            qt6-base-dev \
            qt6-websockets-dev \
            libssl-dev
      
      - name: Create Qt6 config
        run: |
          sudo ln -sf /usr/lib/x86_64-linux-gnu/cmake/Qt6 /opt/Qt
      
      - name: Build Windows Client
        run: |
          cd client
          
          # 创建工具链文件
          cat > mingw.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
          EOF
          
          mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=../mingw.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          
          # 确保文件存在
          ls -la AdaptixClient.exe || exit 1
      
      - name: Upload Client
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: client/build/AdaptixClient.exe
          retention-days: 7
